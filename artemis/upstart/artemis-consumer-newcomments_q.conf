description "newcomments_q - update the /comments pages"

instance $x

stop on artemis-stop or runlevel [016]

respawn
respawn limit 10 5

nice 10
script
    . /etc/default/artemis
    wrap-job paster run --proctitle newcomments_q$x $ARTEMIS_INI $ARTEMIS_ROOT/r2/lib/db/queries.py -c 'run_new_comments()'
end script
