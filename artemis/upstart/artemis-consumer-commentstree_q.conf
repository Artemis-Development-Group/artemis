description "place new comments in the precomputed comment trees"

instance $type$x
env type=commentstree_q

stop on artemis-stop or runlevel [016]

respawn
respawn limit 10 5

nice 10
script
    . /etc/default/artemis
    wrap-job paster run --proctitle $type$x $ARTEMIS_INI $ARTEMIS_ROOT/r2/lib/db/queries.py -c "run_commentstree(qname='$type')"
end script
