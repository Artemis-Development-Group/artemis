description "Apply moderator-defined rules to submissions and comments"

instance $x

stop on artemis-stop or runlevel [016]

respawn
respawn limit 10 5

nice 10
script
    . /etc/default/artemis
    wrap-job paster run --proctitle automoderator_q$x $ARTEMIS_INI $ARTEMIS_ROOT/r2/lib/automoderator.py -c 'run()'
end script
