description "Collect events and publish them elsewhere for processing"

instance $x

stop on artemis-stop or runlevel [016]

respawn
respawn limit 10 5

nice 10
script
    . /etc/default/artemis
    wrap-job paster run --proctitle event_collector_q$x $ARTEMIS_INI $ARTEMIS_ROOT/r2/lib/eventcollector.py -c 'from pylons import app_globals; process_events(app_globals, limit=100)'
end script
