description "Perform expensive cleanup actions ASAP after account deletion"

instance $x

stop on artemis-stop or runlevel [016]

respawn
respawn limit 10 5

nice 10
script
    . /etc/default/artemis
    wrap-job paster run --proctitle del_account_q$x $ARTEMIS_INI $ARTEMIS_ROOT/r2/lib/db/queries.py -c 'consume_deleted_accounts()'
end script
