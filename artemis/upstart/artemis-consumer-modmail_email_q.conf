description "send modmail emails using mailgun"

instance $x

stop on artemis-stop or runlevel [016]

respawn
respawn limit 10 5

nice 10
script
    . /etc/default/artemis
    wrap-job paster run --proctitle modmail_email_q$x "$ARTEMIS_INI" "$ARTEMIS_ROOT"/r2/lib/message_to_email.py -c 'process_modmail_email()'
end script
