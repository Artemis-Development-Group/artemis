description "find thumbnails/embedded content for newly submitted links"

instance $x

stop on artemis-stop or runlevel [016]

respawn
respawn limit 10 5

nice 10
script
    . /etc/default/artemis
    wrap-job paster run --proctitle scraper_q$x $ARTEMIS_INI $ARTEMIS_ROOT/r2/lib/media.py -c 'run()'
end script
