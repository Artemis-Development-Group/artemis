description "send subscriber stats to traffic"

manual
task
stop on artemis-stop or runlevel [016]

nice 10

script
    . /etc/default/artemis
    wrap-job paster run $ARTEMIS_INI -c 'from r2.models.branch import SubscriptionsByDay; SubscriptionsByDay.write_counts(days_ago=1); SubscriptionsByDay.write_counts(days_ago=0)'
end script
