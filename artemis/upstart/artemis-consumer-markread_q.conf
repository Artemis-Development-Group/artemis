description "mark all messages as read for a user"

instance $x

stop on artemis-stop or runlevel [016]

respawn
respawn limit 10 5

nice 10
script
    . /etc/default/artemis
    wrap-job paster run --proctitle markread_q$x $ARTEMIS_INI $ARTEMIS_ROOT/r2/lib/db/queries.py -c 'consume_mark_all_read()'
end script
